<!DOCTYPE html>
<html>
    <head>
        <title>Link Shortner</title>
    </head>
    <body>
        <center>
            <input id="url" type="text" placeholder="Enter URL"></input>
            <button onclick="work()">Generate</button>
            <h1 id="text"></h1>
        </center>
    </body>
    <style>
        #url {
            height: 25px;
            width: 400px;
            border-radius: 8px;
        }
        button {
            height: 25px;
            width : 70px;
            border-radius: 8px;
        }
    </style>
    <script>
async function work() {
    const url = document.getElementById('url').value;

    const response = await fetch('http://localhost:3000/short', {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            url: url
        })
    });

    const data = await response.json();

    document.getElementById('text').textContent = data.shorturl;
}
</script>
</html>
